name: Build TIPA

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: build-tipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build HexCalculator.tipa
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install ldid
        run: brew install ldid

      - name: Build and package TIPA
        run: |
          chmod +x build_tipa.sh
          ./build_tipa.sh

      - name: Upload TIPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexCalculator-tipa
          path: build/HexCalculator.tipa
          if-no-files-found: error
          retention-days: 30

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: HexCalculator-ipa
          path: build/HexCalculator.ipa
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download TIPA
        uses: actions/download-artifact@v4
        with:
          name: HexCalculator-tipa
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HexCalculator.tipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
